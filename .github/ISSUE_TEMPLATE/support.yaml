---
name: Question / Support
description: Ask a question or demander de l'aide
title: "[QUESTION] <subject / sujet>"
labels: ["question"]
---

body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **English:** For bugs, use the "Bug Report" template. For feature requests, use "Feature Request".
        ⚠️ **Français:** Pour les bugs, utilisez le template "Bug Report". Pour les demandes de fonctionnalités, utilisez "Feature Request".
        **This issue is for general questions or configuration help.**
        / **Cette issue est pour les questions générales ou l'aide à la configuration.**

  - type: textarea
    id: question
    attributes:
      label: Your Question / Votre question
      description: |
        **English:** Be precise: describe your setup, what you tried, and any errors encountered.
        **Français:** Soyez précis : décrivez votre configuration, ce que vous avez essayé, et l'erreur rencontrée (le cas échéant).
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version / Version de Home Assistant
      placeholder: 2024.x.x

  - type: input
    id: integration_version
    attributes:
      label: MyLight150 Integration Version / Version de l'intégration MyLight150
      placeholder: v1.0.0